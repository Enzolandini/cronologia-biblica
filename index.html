<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Cronológica Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .checkbox-wrapper input:checked + div {
            background-color: #059669; /* Verde Esmeralda para diferenciar */
            border-color: #059669;
        }
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }
        .day-card.completed {
            opacity: 0.6;
            background-color: #f9fafb;
        }
        .day-card.completed h3 {
            text-decoration: line-through;
            color: #9CA3AF;
        }
        .section-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6B7280;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header Fixo -->
    <header class="fixed top-0 left-0 right-0 bg-white shadow-md z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-gray-800">Leitura Bíblica</h1>
                <p class="text-xs text-emerald-600 font-semibold">Bíblia Toda em 365 Dias</p>
            </div>
            <button onclick="toggleSettings()" class="text-gray-500 hover:text-emerald-600 p-2">
                <i class="fas fa-cog text-xl"></i>
            </button>
        </div>
        <!-- Barra de Progresso -->
        <div class="w-full bg-gray-200 h-1.5">
            <div id="progressBar" class="bg-emerald-600 h-1.5 transition-all duration-500" style="width: 0%"></div>
        </div>
    </header>

    <!-- Modal de Configurações -->
    <div id="settingsPanel" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 animate-fade-in">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-sliders-h text-emerald-500"></i> Ajustes
            </h2>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Data de Início</label>
            <input type="date" id="startDateInput" class="w-full border-gray-300 border rounded-lg p-3 mb-4 focus:ring-2 focus:ring-emerald-500 outline-none text-gray-700 font-mono">
            
            <div class="bg-emerald-50 p-3 rounded-lg mb-4 text-sm text-emerald-800 border border-emerald-100">
                <p class="font-bold mb-1"><i class="fas fa-mobile-alt mr-1"></i> Instalar App:</p>
                <ul class="list-none space-y-1 text-xs">
                    <li><strong>iOS:</strong> Compartilhar <i class="fas fa-share-square"></i> > Tela de Início.</li>
                    <li><strong>Android:</strong> Menu <i class="fas fa-ellipsis-v"></i> > Adicionar à Tela Inicial.</li>
                </ul>
            </div>

            <div class="flex gap-2">
                <button onclick="resetProgress()" class="flex-1 bg-red-50 text-red-600 py-3 rounded-lg font-medium hover:bg-red-100 transition-colors border border-red-200">Resetar</button>
                <button onclick="toggleSettings()" class="flex-1 bg-gray-800 text-white py-3 rounded-lg font-medium hover:bg-gray-900 transition-colors">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Lista de Leitura -->
    <main class="max-w-md mx-auto mt-24 px-4 space-y-3" id="readingList">
        <div class="text-center py-10 text-gray-500 flex flex-col items-center">
            <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-emerald-500"></i>
            <p>Organizando a vida de Jesus...</p>
        </div>
    </main>

    <!-- Resumo Fixo no Rodapé -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] md:hidden z-40">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="flex flex-col">
                <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">Progresso</span>
                <span id="progressText" class="text-emerald-600 font-bold text-lg">0%</span>
            </div>
            <button onclick="scrollToToday()" class="bg-emerald-600 text-white px-4 py-2 rounded-full text-sm font-bold shadow hover:bg-emerald-700 transition-colors">
                Ir para Hoje
            </button>
        </div>
    </div>

    const appKey = 'biblePlan365_v4_chronoJesus'; // Chave nova para não misturar
    
    // Calcula 1 de Dezembro do ano atual
    const now = new Date();
    const currentYear = now.getFullYear();
    const defaultStart = `${currentYear}-12-01`;

    let currentState = JSON.parse(localStorage.getItem(appKey)) || {
        startDate: defaultStart, 
        completed: []
    };

    // DOM Elements
    const listEl = document.getElementById('readingList');
    const startInput = document.getElementById('startDateInput');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const settingsPanel = document.getElementById('settingsPanel');

    // Inicialização
    startInput.value = currentState.startDate;
    render();

    // --- FUNÇÕES ---

    function createSafeDate(dateString) {
        const parts = dateString.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1;
        const day = parseInt(parts[2]);
        return new Date(year, month, day, 12, 0, 0);
    }

    function render() {
        listEl.innerHTML = '';
        let completedCount = 0;
        let startDateObj = createSafeDate(currentState.startDate);

        if (isNaN(startDateObj.getTime())) {
            startDateObj = createSafeDate(defaultStart);
            currentState.startDate = defaultStart;
            localStorage.setItem(appKey, JSON.stringify(currentState));
        }

        const todayReal = new Date();
        todayReal.setHours(12,0,0,0);

        plan.forEach((item, index) => {
            const isDone = currentState.completed.includes(index);
            if (isDone) completedCount++;

            const currentDayDate = new Date(startDateObj);
            currentDayDate.setDate(startDateObj.getDate() + index);
            
            const dateStr = currentDayDate.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            
            // Verifica estado do dia
            const isToday = currentDayDate.toDateString() === todayReal.toDateString();
            const isLate = !isDone && currentDayDate < todayReal;

            const div = document.createElement('div');
            
            // Estilos
            let cardClasses = "day-card relative bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between transition-all duration-200 select-none";
            if (isDone) cardClasses += " completed";
            if (isToday && !isDone) cardClasses += " ring-2 ring-emerald-500 ring-offset-2 z-10 scale-[1.01]";
            if (isLate) cardClasses += " border-l-4 border-l-red-400 bg-red-50/30";

            div.className = cardClasses;
            div.id = `day-${index}`;
            div.innerHTML = `
                <div class="flex flex-col z-10 w-full" onclick="toggleDay(${index})">
                    <span class="text-xs font-bold ${isLate ? 'text-red-500' : 'text-emerald-600'} uppercase tracking-wider mb-0.5 flex items-center gap-2">
                        Dia ${index + 1} • ${dateStr} 
                        ${isToday ? '<span class="bg-emerald-600 text-white px-1.5 py-0.5 rounded text-[10px] animate-pulse">HOJE</span>' : ''}
                        ${isLate ? '<span class="text-red-400 text-[10px]"><i class="fas fa-exclamation-circle"></i></span>' : ''}
                    </span>
                    <h3 class="text-gray-800 font-semibold text-lg leading-tight transition-colors pr-2">${item.t}</h3>
                </div>
                <label class="checkbox-wrapper cursor-pointer relative z-20 p-2 -mr-2">
                    <input type="checkbox" class="sr-only" ${isDone ? 'checked' : ''} onchange="toggleDay(${index})">
                    <div class="w-8 h-8 border-2 border-gray-300 rounded-lg flex items-center justify-center transition-colors hover:border-emerald-400">
                        <svg class="w-5 h-5 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                </label>
            `;
            listEl.appendChild(div);
        });

        const pct = Math.round((completedCount / plan.length) * 100);
        progressBar.style.width = `${pct}%`;
        progressText.innerText = `${pct}%`;
    }

    window.toggleDay = function(index) {
        if (currentState.completed.includes(index)) {
            currentState.completed = currentState.completed.filter(i => i !== index);
        } else {
            currentState.completed.push(index);
            if (navigator.vibrate) navigator.vibrate(20);
        }
        localStorage.setItem(appKey, JSON.stringify(currentState));
        render();
    };

    window.toggleSettings = function() {
        settingsPanel.classList.toggle('hidden');
    };

    window.resetProgress = function() {
        if(confirm('Isso apagará todas as leituras marcadas. Continuar?')) {
            currentState.completed = [];
            localStorage.setItem(appKey, JSON.stringify(currentState));
            render();
            toggleSettings();
        }
    };
    
    window.scrollToToday = function() {
        const todayElement = document.querySelector('.ring-2'); 
        if (todayElement) {
            todayElement.scrollIntoView({behavior: 'smooth', block: 'center'});
        } else {
             const start = createSafeDate(currentState.startDate);
             const todayReal = new Date();
             if (todayReal < start) window.scrollTo({top: 0, behavior: 'smooth'});
             else window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
        }
    };

    startInput.addEventListener('change', (e) => {
        currentState.startDate = e.target.value;
        localStorage.setItem(appKey, JSON.stringify(currentState));
        render();
    });

</script>
</body>
</html>
